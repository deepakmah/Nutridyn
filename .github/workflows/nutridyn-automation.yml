name: Nutridyn Automation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *'           # Every day at 6:00 AM UTC
  workflow_dispatch:
    inputs:
      headless:
        description: 'Run in headless mode?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run-automation:
    name: Run Nutridyn Selenium Tests
    runs-on: ubuntu-latest

    env:
      HEADLESS: ${{ github.event.inputs.headless || 'true' }}
      IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 24 ────────────────────────────────────────────────
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      # ── 3. Install Chrome + matching ChromeDriver in one step ─────────────
      - name: Setup Chrome + ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Verify Chrome & ChromeDriver versions
        run: |
          google-chrome --version || ${{ steps.setup-chrome.outputs.chrome-path }} --version
          chromedriver --version

      # ── 4. Cache Maven dependencies ──────────────────────────────────────
      - name: Cache Maven Packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 5. Build the project ──────────────────────────────────────────────
      - name: Build with Maven
        run: |
          mvn clean compile -q \
            -Dmaven.compiler.enablePreview=true \
            -Dmaven.compiler.source=24 \
            -Dmaven.compiler.target=24

      # ── 6. Run Nutridyn automation ────────────────────────────────────────
      - name: Run Nutridyn Automation
        env:
          MAVEN_OPTS: "--enable-preview"
        run: |
          mvn exec:java \
            -Dexec.mainClass="Nutridyn" \
            -Dexec.cleanupDaemonThreads=false \
            -Dmaven.compiler.enablePreview=true \
            -Dmaven.compiler.source=24 \
            -Dmaven.compiler.target=24
        continue-on-error: true

      # ── 7. Check if CSV was generated ────────────────────────────────────
      - name: Check CSV exists
        id: check_csv
        run: |
          if [ -f ~/NutridynAutomation/reports/Nutridyn.csv ]; then
            echo "csv_exists=true" >> $GITHUB_OUTPUT
            echo "CSV found:"
            cat ~/NutridynAutomation/reports/Nutridyn.csv
          else
            echo "csv_exists=false" >> $GITHUB_OUTPUT
            echo "CSV not found — creating a placeholder"
            mkdir -p ~/NutridynAutomation/reports
            echo "Timestamp,Title,LocalFile,UploadedURL" > ~/NutridynAutomation/reports/Nutridyn.csv
            echo "$(date),,No steps recorded,N/A" >> ~/NutridynAutomation/reports/Nutridyn.csv
          fi

      # ── 8. Send email with CSV attachment ────────────────────────────────
      - name: Send Test Results Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_SENDER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Nutridyn Automation Test Results – ${{ github.run_number }} | ${{ github.run_id }}"
          to: deepak.maheshwari@exinent.com,sangeetha.arora@exinent.com
          from: Nutridyn Automation <${{ secrets.MAIL_SENDER }}>
          body: |
            Hi Deepak and Sangeetha,

            Please find the attached CSV file with the Nutridyn automation test results for today's run.

            Run Details:
            - Run Number : ${{ github.run_number }}
            - Triggered  : ${{ github.event_name }}
            - Branch     : ${{ github.ref_name }}
            - Date       : ${{ github.run_id }}

            You can also view the full report and screenshots in the GitHub Actions artifacts:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Thanks,
            Nutridyn Automation Bot
          attachments: ~/NutridynAutomation/reports/Nutridyn.csv

      # ── 9. Upload HTML report ─────────────────────────────────────────────
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nutridyn-html-report-${{ github.run_number }}
          path: ~/NutridynAutomation/html/
          retention-days: 30

      # ── 10. Upload Screenshots ────────────────────────────────────────────
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nutridyn-screenshots-${{ github.run_number }}
          path: ~/NutridynAutomation/screenshots/
          retention-days: 30

      # ── 11. Upload CSV report ─────────────────────────────────────────────
      - name: Upload CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nutridyn-csv-report-${{ github.run_number }}
          path: ~/NutridynAutomation/reports/Nutridyn.csv
          retention-days: 30

      # ── 12. Print test summary ────────────────────────────────────────────
      - name: Print Test Summary
        if: always()
        run: |
          echo "======================================"
          echo "   NUTRIDYN AUTOMATION TEST SUMMARY  "
          echo "======================================"
          echo "Run Number : ${{ github.run_number }}"
          echo "Triggered  : ${{ github.event_name }}"
          echo "Branch     : ${{ github.ref_name }}"
          echo "Headless   : ${{ env.HEADLESS }}"
          echo "======================================"
          if [ -f ~/NutridynAutomation/reports/Nutridyn.csv ]; then
            echo "CSV Report:"
            cat ~/NutridynAutomation/reports/Nutridyn.csv
          else
            echo "CSV report not found."
          fi
