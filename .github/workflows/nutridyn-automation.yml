name: Nutridyn Automation Tests

on:
  # ── Triggers ────────────────────────────────────────────────────────────
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *'           # Runs daily at 6:00 AM UTC
  workflow_dispatch:               # Manual trigger from GitHub UI
    inputs:
      headless:
        description: 'Run in headless mode?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run-automation:
    name: Run Nutridyn Selenium Tests
    runs-on: ubuntu-latest

    env:
      HEADLESS: ${{ github.event.inputs.headless || 'true' }}
      IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 24 ────────────────────────────────────────────────
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      # ── 3. Install Google Chrome ─────────────────────────────────────────
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | \
            sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 4. Install ChromeDriver (matching Chrome version) ─────────────────
      - name: Install ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          CHROME_MAJOR=$(echo $CHROME_VERSION | cut -d. -f1)
          echo "Chrome version: $CHROME_VERSION (Major: $CHROME_MAJOR)"

          # Chrome 115+ uses the new Chrome for Testing endpoint
          if [ "$CHROME_MAJOR" -ge 115 ]; then
            DRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
            wget -q "$DRIVER_URL" -O /tmp/chromedriver.zip || \
              wget -q "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_STABLE" -O /tmp/latest_version && \
              LATEST=$(cat /tmp/latest_version) && \
              wget -q "https://storage.googleapis.com/chrome-for-testing-public/${LATEST}/linux64/chromedriver-linux64.zip" -O /tmp/chromedriver.zip
            unzip -q /tmp/chromedriver.zip -d /tmp/
            sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          else
            DRIVER_VERSION=$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_${CHROME_MAJOR}")
            wget -q "https://chromedriver.storage.googleapis.com/${DRIVER_VERSION}/chromedriver_linux64.zip" -O /tmp/chromedriver.zip
            unzip -q /tmp/chromedriver.zip -d /tmp/
            sudo mv /tmp/chromedriver /usr/local/bin/chromedriver
          fi

          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      # ── 5. Cache Maven dependencies ──────────────────────────────────────
      - name: Cache Maven Packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 6. Build the project ─────────────────────────────────────────────
      - name: Build with Maven
        run: mvn clean compile --enable-preview -q

      # ── 7. Run Nutridyn automation ────────────────────────────────────────
      - name: Run Nutridyn Automation
        run: |
          mvn exec:java \
            -Dexec.mainClass="Nutridyn" \
            --enable-preview \
            -Dexec.cleanupDaemonThreads=false
        continue-on-error: true          # Always collect artifacts even on failure

      # ── 8. Upload HTML report ─────────────────────────────────────────────
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nutridyn-html-report-${{ github.run_number }}
          path: ~/NutridynAutomation/html/
          retention-days: 30

      # ── 9. Upload screenshots ─────────────────────────────────────────────
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nutridyn-screenshots-${{ github.run_number }}
          path: ~/NutridynAutomation/screenshots/
          retention-days: 30

      # ── 10. Upload CSV report ─────────────────────────────────────────────
      - name: Upload CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nutridyn-csv-report-${{ github.run_number }}
          path: ~/NutridynAutomation/reports/Nutridyn.csv
          retention-days: 30

      # ── 11. Print test summary to console ────────────────────────────────
      - name: Print Test Summary
        if: always()
        run: |
          echo "======================================"
          echo "   NUTRIDYN AUTOMATION TEST SUMMARY  "
          echo "======================================"
          echo "Run Number : ${{ github.run_number }}"
          echo "Triggered  : ${{ github.event_name }}"
          echo "Branch     : ${{ github.ref_name }}"
          echo "Headless   : ${{ env.HEADLESS }}"
          echo "======================================"
          if [ -f ~/NutridynAutomation/reports/Nutridyn.csv ]; then
            echo "CSV Report preview:"
            cat ~/NutridynAutomation/reports/Nutridyn.csv
          else
            echo "CSV report not found."
          fi
